services:
  # ---- API Backend ----
  - type: web
    name: llui-transport-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    region: frankfurt        # Europe — latence réduite depuis Cameroun
    plan: starter            # 512 MB RAM — suffisant pour démarrer
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4000
      - key: DB_HOST
        fromDatabase:
          name: llui-transport-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: llui-transport-db
          property: port
      - key: DB_NAME
        fromDatabase:
          name: llui-transport-db
          property: database
      - key: DB_USER
        fromDatabase:
          name: llui-transport-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: llui-transport-db
          property: password
      - key: DB_SSL
        value: "true"
      - key: REDIS_HOST
        fromService:
          name: llui-transport-redis
          type: redis
          property: host
      - key: REDIS_PORT
        fromService:
          name: llui-transport-redis
          type: redis
          property: port
      - key: REDIS_PASSWORD
        fromService:
          name: llui-transport-redis
          type: redis
          property: password
      # Secrets à renseigner manuellement dans le dashboard Render :
      - key: JWT_SECRET
        sync: false
      - key: MINDEE_API_KEY
        sync: false
      - key: TWILIO_ACCOUNT_SID
        sync: false
      - key: TWILIO_AUTH_TOKEN
        sync: false
      - key: TWILIO_PHONE_NUMBER
        sync: false
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      - key: AWS_S3_BUCKET
        sync: false
      - key: AWS_REGION
        value: eu-west-1
      # Métier
      - key: OPERATOR_MARGIN_PCT
        value: "12"
      - key: INSURANCE_RATE_PCT
        value: "0.8"
    buildCommand: ""          # Le Dockerfile gère le build

  # ---- Worker OCR (même image, commande différente) ----
  - type: worker
    name: llui-transport-ocr-worker
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    region: frankfurt
    plan: starter
    startCommand: node dist/workers/runOcrWorker.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DB_HOST
        fromDatabase:
          name: llui-transport-db
          property: host
      - key: DB_PORT
        fromDatabase:
          name: llui-transport-db
          property: port
      - key: DB_NAME
        fromDatabase:
          name: llui-transport-db
          property: database
      - key: DB_USER
        fromDatabase:
          name: llui-transport-db
          property: user
      - key: DB_PASSWORD
        fromDatabase:
          name: llui-transport-db
          property: password
      - key: DB_SSL
        value: "true"
      - key: REDIS_HOST
        fromService:
          name: llui-transport-redis
          type: redis
          property: host
      - key: REDIS_PORT
        fromService:
          name: llui-transport-redis
          type: redis
          property: port
      - key: REDIS_PASSWORD
        fromService:
          name: llui-transport-redis
          type: redis
          property: password
      - key: MINDEE_API_KEY
        sync: false

# ---- PostgreSQL ----
databases:
  - name: llui-transport-db
    databaseName: llui_transport
    user: llui
    region: frankfurt
    plan: starter             # 1 GB stockage — suffisant Sprint 1
    postgresMajorVersion: "15"

# ---- Redis (BullMQ + cache) ----
  - type: redis
    name: llui-transport-redis
    region: frankfurt
    plan: starter
    maxmemoryPolicy: noeviction
